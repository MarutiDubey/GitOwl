name: GitOwl Review

# Runs GitOwl against the pull request and posts a review comment.
on:
  pull_request:
    types: [opened, synchronize, reopened]

# Needed to post/update the review comment on the PR.
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install GitOwl
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GitOwl review
        env:
          # Provided by the repo/org secrets. Defaults to OpenRouter.
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'openrouter' }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL || 'https://openrouter.ai/api/v1' }}
          AI_MODEL: ${{ vars.AI_MODEL || 'openai/gpt-4o-mini' }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m gitowl.cli review-pr \
            "${{ github.repository }}" \
            "${{ github.event.pull_request.number }}" \
            --post
