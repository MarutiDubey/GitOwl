# Copy this file into your repo at .github/workflows/gitowl-review.yml.
#
# Setup:
#   1. Add a repo secret AI_API_KEY (Settings -> Secrets and variables -> Actions)
#      with your OpenRouter (or OpenAI) key.
#   2. (Optional) Set repo variables AI_PROVIDER / AI_MODEL / AI_BASE_URL to
#      override the defaults below.
#   3. Open a pull request -- GitOwl posts a review comment automatically.
#
# See https://github.com/MarutiDubey/GitOwl for details.

name: GitOwl Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install GitOwl
        run: pip install gitowl
        # Add semgrep static analysis too: pip install "gitowl[semgrep]"

      - name: Run GitOwl review
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'openrouter' }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL || 'https://openrouter.ai/api/v1' }}
          AI_MODEL: ${{ vars.AI_MODEL || 'openai/gpt-4o-mini' }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gitowl review-pr \
            "${{ github.repository }}" \
            "${{ github.event.pull_request.number }}" \
            --post
